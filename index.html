<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Les petits plats – Recettes</title>

  <!-- Police Manrope -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS -->
  <link href="./css/style.css" rel="stylesheet">
</head>

<body class="min-h-dvh bg-light-gray text-slate-900">
  <!-- hero : contenu titre + recherche centré dans la zone (logo en haut à gauche) -->
  <header class="relative flex min-h-[667px] flex-col bg-slate-900 bg-cover bg-center bg-no-repeat"
    style="background-image: url('./assets/images/Header_Les-petits-plats.png');">
    <div class="absolute inset-0 bg-black/40" aria-hidden="true"></div>
    <div class="relative z-10 mx-auto flex min-h-[667px] w-full max-w-6xl flex-1 flex-col px-4">
      <div class="absolute left-4 top-6 z-20 sm:left-8">
        <img src="./assets/images/Logo.svg" alt="Les petits plats"
          class="min-h-[25.26px] h-auto w-auto brightness-0 invert" />
      </div>
      <div class="flex flex-1 flex-col items-center justify-center px-2 pb-10 pt-20 text-center sm:px-4">
        <div class="flex w-full max-w-[954px] flex-col items-center gap-8 sm:gap-10">
          <p
            class="mx-auto flex max-w-2xl flex-col items-center text-center font-Anton text-heading font-normal uppercase leading-none tracking-normal text-primary">
            <span>Cherchez parmi plus de 1500 recettes</span>
            <span>du quotidien, simples et délicieuses</span>
          </p>
          <form id="recipe-search-form" role="search" aria-label="Recherche de recettes" class="w-full">
            <div
              class="mx-auto flex h-[72px] w-full max-w-[954px] items-center gap-0 overflow-hidden rounded-ui bg-white pl-8 pr-[10px] shadow-search">
              <input type="search" id="recipe-search-input" name="q" autocomplete="off"
                aria-label="Rechercher une recette ou un ingrédient"
                placeholder="Rechercher une recette, un ingrédient, ..."
                class="min-w-0 flex-1 border-0 bg-transparent font-manrope text-base font-normal leading-none tracking-normal text-dark outline-none placeholder:font-manrope placeholder:text-base placeholder:font-normal placeholder:leading-none placeholder:tracking-normal placeholder:text-gray" />
              <button type="submit"
                class="inline-flex h-[55px] w-[50px] shrink-0 items-center justify-center rounded-ui border-0 bg-dark text-white transition-opacity hover:opacity-90 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary"
                aria-label="Lancer la recherche">
                <svg width="27" height="28" viewBox="0 0 27 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <circle cx="11" cy="11" r="6.5" stroke="#FFFFFF" stroke-width="1" />
                  <path d="M17 17L24.5 24.5" stroke="#FFFFFF" stroke-width="1" stroke-linecap="round" />
                </svg>
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8">
    <!-- section recettes -->
    <section aria-labelledby="recipes-title">
      <!-- header (filtres + résultat) -->
      <header class="flex flex-wrap items-center justify-between gap-4 mb-6">
        <div class="flex flex-col items-start gap-3 min-w-0 flex-1">
          <h1 id="recipes-title" class="hidden">
            Recettes Les petits plats
          </h1>
          <!-- filtres -->
          <div class="flex flex-wrap items-center gap-filters" role="group" aria-label="Filtres de recherche">

            <!-- ── Filtre Ingrédients ──────────────────────────────────────── -->
            <div class="relative flex flex-col items-start gap-2 shrink-0">
              <button type="button" id="btn-ingredients"
                class="recipes-filter-btn inline-flex h-14 w-[195px] items-center justify-between rounded-ui border-none bg-white px-4 py-[17px] font-manrope text-base font-medium leading-none text-dark transition-colors hover:bg-neutral-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary cursor-pointer"
                data-filter="ingredients" aria-expanded="false" aria-haspopup="listbox" aria-label="Filtrer par ingrédient">
                <span class="flex-1 text-left">Ingrédients</span>
                <svg class="ml-2 shrink-0 text-dark" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div id="dropdown-ingredients"
                class="absolute left-0 top-full z-50 mt-1 hidden min-w-[195px] rounded-ui bg-white shadow-lg"
                role="listbox" aria-label="Ingrédients">
                <div class="relative flex items-center border border-gray-300 rounded-md mx-3 mt-3 mb-2">
                  <input type="text" id="search-ingredients"
                    class="w-full py-2 pl-3 pr-8 font-manrope text-sm text-dark bg-transparent outline-none"
                    aria-label="Rechercher dans Ingrédients" />
                  <button type="button" id="clear-ingredients"
                    class="absolute right-7 hidden text-gray-400 hover:text-dark"
                    aria-label="Effacer la recherche">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                      <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                  </button>
                  <span class="absolute right-2 text-gray-400 pointer-events-none">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                      <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
                      <line x1="10" y1="10" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                  </span>
                </div>
                <ul id="list-ingredients" class="m-0 list-none p-0 max-h-[220px] overflow-y-auto pb-2"></ul>
              </div>
            </div>

            <!-- ── Filtre Appareils ───────────────────────────────────────── -->
            <div class="relative flex flex-col items-start gap-2 shrink-0">
              <button type="button" id="btn-appliances"
                class="recipes-filter-btn inline-flex h-14 w-[195px] items-center justify-between rounded-ui border-none bg-white px-4 py-[17px] font-manrope text-base font-medium leading-none text-dark transition-colors hover:bg-neutral-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary cursor-pointer"
                data-filter="appliances" aria-expanded="false" aria-haspopup="listbox" aria-label="Filtrer par appareil">
                <span class="flex-1 text-left">Appareils</span>
                <svg class="ml-2 shrink-0 text-dark" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div id="dropdown-appliances"
                class="absolute left-0 top-full z-50 mt-1 hidden min-w-[195px] rounded-ui bg-white shadow-lg"
                role="listbox" aria-label="Appareils">
                <div class="relative flex items-center border border-gray-300 rounded-md mx-3 mt-3 mb-2">
                  <input type="text" id="search-appliances"
                    class="w-full py-2 pl-3 pr-8 font-manrope text-sm text-dark bg-transparent outline-none"
                    aria-label="Rechercher dans Appareils" />
                  <button type="button" id="clear-appliances"
                    class="absolute right-7 hidden text-gray-400 hover:text-dark"
                    aria-label="Effacer la recherche">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                      <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                  </button>
                  <span class="absolute right-2 text-gray-400 pointer-events-none">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                      <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
                      <line x1="10" y1="10" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                  </span>
                </div>
                <ul id="list-appliances" class="m-0 list-none p-0 max-h-[220px] overflow-y-auto pb-2"></ul>
              </div>
            </div>

            <!-- ── Filtre Ustensiles ──────────────────────────────────────── -->
            <div class="relative flex flex-col items-start gap-2 shrink-0">
              <button type="button" id="btn-ustensils"
                class="recipes-filter-btn inline-flex h-14 w-[195px] items-center justify-between rounded-ui border-none bg-white px-4 py-[17px] font-manrope text-base font-medium leading-none text-dark transition-colors hover:bg-neutral-100 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary cursor-pointer"
                data-filter="ustensils" aria-expanded="false" aria-haspopup="listbox" aria-label="Filtrer par ustensile">
                <span class="flex-1 text-left">Ustensiles</span>
                <svg class="ml-2 shrink-0 text-dark" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <div id="dropdown-ustensils"
                class="absolute left-0 top-full z-50 mt-1 hidden min-w-[195px] rounded-ui bg-white shadow-lg"
                role="listbox" aria-label="Ustensiles">
                <div class="relative flex items-center border border-gray-300 rounded-md mx-3 mt-3 mb-2">
                  <input type="text" id="search-ustensils"
                    class="w-full py-2 pl-3 pr-8 font-manrope text-sm text-dark bg-transparent outline-none"
                    aria-label="Rechercher dans Ustensiles" />
                  <button type="button" id="clear-ustensils"
                    class="absolute right-7 hidden text-gray-400 hover:text-dark"
                    aria-label="Effacer la recherche">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                      <path d="M1 1L9 9M9 1L1 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                  </button>
                  <span class="absolute right-2 text-gray-400 pointer-events-none">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                      <circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/>
                      <line x1="10" y1="10" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                  </span>
                </div>
                <ul id="list-ustensils" class="m-0 list-none p-0 max-h-[220px] overflow-y-auto pb-2"></ul>
              </div>
            </div>

          </div>
          <!-- tags -->
          <div id="recipes-selected-list" class="flex flex-wrap items-center gap-filters" aria-live="polite"></div>
        </div>
        <!-- résultat -->
        <p id="recipes-count" class="font-Anton text-result font-normal leading-none tracking-normal text-dark shrink-0"
          aria-live="polite"></p>
      </header>

      <!-- grille de recettes -->
      <div id="recipes-grid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3" aria-live="polite">
      </div>
    </section>
  </main>

  <script src="./js/main.js" type="module"></script>
</body>

</html>
